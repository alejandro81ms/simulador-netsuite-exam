<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados • Simulador NetSuite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            font-weight: 700;
            position: relative;
        }
        
        .results-summary {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .result-detail-item {
            padding: 0.75rem;
            border-radius: 12px;
            margin-bottom: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .result-detail-item:hover {
            transform: translateX(4px);
        }
        
        .correct-bg {
            background: #ecfdf5;
            border-left: 4px solid #10b981;
        }
        
        .incorrect-bg {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
        }
        
        .detail-expanded {
            padding: 0.75rem;
            margin: 0.25rem 0 0.75rem 2.5rem;
            background: #f8fafc;
            border-radius: 8px;
            display: none;
            font-size: 0.85rem;
        }
        
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 6px 14px;
            border-radius: 9999px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        
        .filter-btn.active {
            background: #0077C5;
            color: white;
            border-color: #0077C5;
        }
        
        .header-compact .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <!-- Header Compacto -->
    <div class="header-compact">
        <div class="container">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div class="logo-container">
                    <img src="https://www.netsuite.com/portal/common/images/logo-oracle-netsuite.svg" alt="NetSuite" class="netsuite-logo" style="height: 32px;">
                    <div>
                        <h1 class="title">Resultados</h1>
                        <p class="subtitle-text" style="color:#0077C5; font-weight:500; font-size:0.7rem;">SuiteFoundation Exam</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="exam-card" style="padding: 1.5rem;">
            <div class="results-summary">
                <div class="score-circle" id="score-circle">
                    <div id="score-text">0%</div>
                </div>
                <h3 id="result-message" style="font-size: 1.2rem; margin-bottom: 0.25rem;"></h3>
                <p id="result-details" style="color: #64748b; font-size: 0.9rem;"></p>
            </div>
            
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterResults('all')">Todas</button>
                <button class="filter-btn" onclick="filterResults('correct')">✅ Correctas</button>
                <button class="filter-btn" onclick="filterResults('incorrect')">❌ Incorrectas</button>
            </div>
            
            <div id="results-container"></div>
            
            <div class="footer" style="margin-top: 1.5rem;">
                <button onclick="reviewWrong()" id="review-btn" class="btn-submit" style="padding: 8px 20px;">📚 Repasar Errores</button>
                <button onclick="goHome()" class="btn-reset" style="padding: 8px 20px;">🏠 Nuevo Simulador</button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        let questionResults = {};
        let totalQuestions = 0;
        let currentFilter = 'all';
        
        function init() {
            const savedResults = localStorage.getItem('finalResults');
            if (savedResults) {
                questionResults = JSON.parse(savedResults);
            } else {
                alert('No se encontraron resultados. Por favor, realiza el examen primero.');
                window.location.href = 'index.html';
                return;
            }
            
            totalQuestions = parseInt(localStorage.getItem('totalQuestions')) || QUESTIONS_DB.length;
            
            const correctCount = Object.values(questionResults).filter(r => r.isCorrect).length;
            const percentage = Math.round((correctCount / totalQuestions) * 100);
            
            const scoreCircle = document.getElementById('score-circle');
            const degrees = (percentage / 100) * 360;
            scoreCircle.style.background = `conic-gradient(#0077C5 0deg ${degrees}deg, #e2e8f0 ${degrees}deg 360deg)`;
            document.getElementById('score-text').innerHTML = `${percentage}<span style="font-size:1rem;">%</span>`;
            
            if (percentage >= 80) {
                document.getElementById('result-message').innerHTML = "¡Excelente!";
            } else if (percentage >= 70) {
                document.getElementById('result-message').innerHTML = "¡Muy bien!";
            } else if (percentage >= 60) {
                document.getElementById('result-message').innerHTML = "Buen intento";
            } else {
                document.getElementById('result-message').innerHTML = "Sigue practicando";
            }
            
            document.getElementById('result-details').innerHTML = `${correctCount} de ${totalQuestions} correctas (${percentage}%)`;
            
            const incorrectCount = Object.values(questionResults).filter(r => !r.isCorrect).length;
            document.getElementById('review-btn').style.display = incorrectCount > 0 ? 'block' : 'none';
            
            renderResults();
        }
        
        function renderResults() {
            const container = document.getElementById('results-container');
            let html = '';
            
            QUESTIONS_DB.forEach(q => {
                const result = questionResults[q.id];
                if (!result) return;
                
                if (currentFilter === 'correct' && !result.isCorrect) return;
                if (currentFilter === 'incorrect' && result.isCorrect) return;
                
                const userText = result.userAnswer.length ? 
                    result.userAnswer.map(a => {
                        const opt = q.options.find(o => o.value === a);
                        return opt ? opt.label : a;
                    }).join(" • ") : "Sin responder";
                
                const correctText = Array.isArray(result.correctAnswer) ? 
                    result.correctAnswer.map(c => {
                        const opt = q.options.find(o => o.value === c);
                        return opt ? opt.label : c;
                    }).join(" • ") : 
                    q.options.find(o => o.value === result.correctAnswer).label;
                
                html += `
                    <div class="result-detail-item ${result.isCorrect ? 'correct-bg' : 'incorrect-bg'}" onclick="toggleDetail(${q.id})">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <div style="font-size: 1.2rem;">${result.isCorrect ? "✅" : "❌"}</div>
                            <div style="flex: 1;">
                                <strong style="font-size: 0.9rem;">Preg
