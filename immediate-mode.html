<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Inmediato • Simulador NetSuite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .navigation-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        
        .feedback-correct {
            background: #d1fae5;
            border-left: 4px solid #10b981;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
        }
        
        .feedback-incorrect {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
        }
        
        .header-compact .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-compact .timer-container {
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="header-compact">
        <div class="container">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;">
                <div class="logo-container">
                    <img src="netsuite_logo.jpg" alt="NetSuite" class="netsuite-logo" style="height: 32px;">
                    <div>
                        <h1 class="title">Modo Inmediato</h1>
                        <p class="subtitle-text" style="color:#0077C5; font-weight:500; font-size:0.7rem;">Feedback por pregunta</p>
                    </div>
                </div>
                <div class="timer-container">
                    <div id="timer" style="font-size: 1rem; font-weight: 600; color: #0077C5;">60:00</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="exam-card">
            <div class="progress">
                <span style="font-size: 0.9rem;">Pregunta <span id="current-q-num">1</span> de <span id="total-q">0</span></span>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <span id="score-display" style="font-size: 0.9rem;">0%</span>
            </div>
            
            <div id="question-container"></div>
            
            <div id="feedback-container"></div>
            
            <div class="navigation-buttons">
                <button onclick="previousQuestion()" id="prev-btn" class="btn-nav" style="background: #64748b; padding: 8px 20px;">◀ Anterior</button>
                <button onclick="checkAnswer()" id="check-btn" class="btn-submit" style="padding: 8px 20px;">✓ Verificar</button>
                <button onclick="nextQuestion()" id="next-btn" class="btn-submit" style="padding: 8px 20px;">Siguiente ▶</button>
            </div>
            
            <div class="footer" style="margin-top: 1.5rem;">
                <button onclick="finishExam()" class="btn-submit" style="padding: 8px 20px;">Finalizar</button>
                <button onclick="goHome()" class="btn-reset" style="padding: 8px 20px;">Inicio</button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        let currentIndex = 0;
        let userAnswers = {};
        let questionResults = {};
        let timerInterval = null;
        let timeLeft = 3600;
        let totalQuestions = 0;

        // Mostrar advertencia si intentan salir o recargar
        window.addEventListener('beforeunload', function (e) {
            if (timerInterval !== null) {
                e.preventDefault();
                e.returnValue = ''; 
            }
        });

        // FUNCIÓN PARA MEZCLAR EL ORDEN
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function init() {
            const savedAnswers = localStorage.getItem('immediateAnswers');
            const savedOrder = localStorage.getItem('shuffledOrder');
            const savedResults = localStorage.getItem('immediateResults');
            
            if (savedAnswers && savedOrder) {
                // Recuperar progreso
                userAnswers = JSON.parse(savedAnswers);
                const parsedOrder = JSON.parse(savedOrder);
                QUESTIONS_DB.splice(0, QUESTIONS_DB.length, ...parsedOrder);
                
                if (savedResults) {
                    questionResults = JSON.parse(savedResults);
                }
            } else {
                // Examen nuevo
                shuffleArray(QUESTIONS_DB);
                QUESTIONS_DB.forEach(q => {
                    if(q.options) shuffleArray(q.options);
                });
                localStorage.setItem('shuffledOrder', JSON.stringify(QUESTIONS_DB));
            }

            totalQuestions = QUESTIONS_DB.length;
            document.getElementById('total-q').textContent = totalQuestions;
            
            startTimer();
            renderQuestion();
        }
        
        function startTimer() {
            const savedTime = localStorage.getItem('timeLeft');
            if (savedTime) {
                timeLeft = parseInt(savedTime);
            }
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    finishExam();
                } else {
                    timeLeft--;
                    localStorage.setItem('timeLeft', timeLeft);
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    document.getElementById("timer").textContent = 
                        `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
                }
            }, 1000);
        }
        
        function renderQuestion() {
            const question = QUESTIONS_DB[currentIndex];
            const container = document.getElementById('question-container');
            
            // Verificamos si ya hay un resultado guardado para esta pregunta
            const hasResult = questionResults[question.id] !== undefined;
            
            let html = `
                <div class="question">
                    <div class="question-header">
                        <div class="question-number" style="width: 35px; height: 35px; font-size: 1rem;">${currentIndex + 1}</div>
                        <div class="question-text" style="font-size: 1rem;">${escapeHtml(question.text)}</div>
                        ${question.type === "multi" ? `<div class="multi-label" style="font-size: 0.7rem;">Elige ${question.correct.length}</div>` : ""}
                    </div>
                    <div class="options">
            `;
            
            question.options.forEach(opt => {
                const isChecked = userAnswers[question.id] && userAnswers[question.id].includes(opt.value);
                const inputType = question.type === "multi" ? "checkbox" : "radio";
                const name = question.type === "single" ? `name="q${question.id}"` : "";
                
                // Aplicamos el atributo disabled y bajamos la opacidad si ya fue verificada
                html += `
                    <label class="option" style="padding: 10px 14px; ${hasResult ? 'opacity: 0.6; cursor: not-allowed;' : ''}">
                        <input type="${inputType}" ${name} value="${opt.value}" ${isChecked ? 'checked' : ''} ${hasResult ? 'disabled' : ''}
                                onchange="saveAnswer(${question.id}, '${opt.value}', '${question.type}', this)">
                        <span class="option-label" style="font-size: 0.9rem;">${escapeHtml(opt.label)}</span>
                    </label>
                `;
            });
            
            html += `</div></div>`;
            container.innerHTML = html;
            
            const feedbackDiv = document.getElementById('feedback-container');
            const checkBtn = document.getElementById('check-btn');
            
            // Lógica para mostrar feedback si ya fue respondida
            if (hasResult) {
                const result = questionResults[question.id];
                
                const correctText = Array.isArray(question.correct) ? 
                    question.correct.map(c => {
                        const opt = question.options.find(o => o.value === c);
                        return opt ? opt.label : c;
                    }).join(" • ") : 
                    question.options.find(o => o.value === question.correct).label;
                
                const userText = result.userAnswer.length ? 
                    result.userAnswer.map(a => {
                        const opt = question.options.find(o => o.value === a);
                        return opt ? opt.label : a;
                    }).join(" • ") : "No respondida";

                feedbackDiv.innerHTML = `
                    <div class="${result.isCorrect ? 'feedback-correct' : 'feedback-incorrect'}" style="padding: 0.75rem; font-size: 0.9rem;">
                        <strong>${result.isCorrect ? '✓ ¡Correcto!' : '✗ Incorrecto'}</strong><br>
                        <strong>Tu respuesta:</strong> ${userText}<br>
                        <strong>Correcta:</strong> ${correctText}<br>
                        ${question.explanation ? `<strong>Explicación:</strong> ${question.explanation.substring(0, 150)}${question.explanation.length > 150 ? '...' : ''}` : ''}
                    </div>
                `;
                
                if (currentIndex === totalQuestions - 1) {
                    checkBtn.style.display = 'block';
                    checkBtn.textContent = 'Finalizar';
                    checkBtn.onclick = finishExam;
                } else {
                    checkBtn.style.display = 'none';
                }
            } else {
                feedbackDiv.innerHTML = '';
                checkBtn.style.display = 'inline-block';
                checkBtn.textContent = '✓ Verificar';
                checkBtn.onclick = checkAnswer;
            }
            
            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            updateProgress();
        }
        
        function saveAnswer(qId, value, type, inputElement) {
            const question = QUESTIONS_DB.find(q => q.id === qId);
            if (!question) return;
            
            if (type === "single") {
                userAnswers[qId] = [value];
            } else {
                if (!userAnswers[qId]) userAnswers[qId] = [];
                
                if (inputElement.checked) {
                    if (userAnswers[qId].length >= question.correct.length) {
                        inputElement.checked = false;
                        alert(`Solo puedes seleccionar ${question.correct.length} opción(es) para esta pregunta.`);
                        return;
                    }
                    userAnswers[qId].push(value);
                } else {
                    userAnswers[qId] = userAnswers[qId].filter(v => v !== value);
                }
            }
            
            localStorage.setItem('immediateAnswers', JSON.stringify(userAnswers));
            updateProgress();
        }
        
        function checkAnswer() {
            const question = QUESTIONS_DB[currentIndex];
            const userAnswer = userAnswers[question.id] || [];
            let isCorrect = false;
            
            if (question.type === "single") {
                isCorrect = userAnswer[0] === question.correct;
            } else {
                isCorrect = JSON.stringify(userAnswer.sort()) === JSON.stringify(question.correct.sort());
            }
            
            const correctText = Array.isArray(question.correct) ? 
                question.correct.map(c => {
                    const opt = question.options.find(o => o.value === c);
                    return opt ? opt.label : c;
                }).join(" • ") : 
                question.options.find(o => o.value === question.correct).label;
            
            const userText = userAnswer.length ? 
                userAnswer.map(a => {
                    const opt = question.options.find(o => o.value === a);
                    return opt ? opt.label : a;
                }).join(" • ") : "No respondida";
            
            const feedbackDiv = document.getElementById('feedback-container');
            feedbackDiv.innerHTML = `
                <div class="${isCorrect ? 'feedback-correct' : 'feedback-incorrect'}" style="padding: 0.75rem; font-size: 0.9rem;">
                    <strong>${isCorrect ? '✓ ¡Correcto!' : '✗ Incorrecto'}</strong><br>
                    <strong>Tu respuesta:</strong> ${userText}<br>
                    <strong>Correcta:</strong> ${correctText}<br>
                    ${question.explanation ? `<strong>Explicación:</strong> ${question.explanation.substring(0, 150)}${question.explanation.length > 150 ? '...' : ''}` : ''}
                </div>
            `;
            
            questionResults[question.id] = {
                isCorrect: isCorrect,
                userAnswer: userAnswer,
                correctAnswer: question.correct
            };
            
            localStorage.setItem('immediateResults', JSON.stringify(questionResults));
            
            // DESHABILITAR LOS INPUTS AL VERIFICAR
            const inputs = document.querySelectorAll('#question-container input');
            inputs.forEach(input => input.disabled = true);
            
            const labels = document.querySelectorAll('#question-container .option');
            labels.forEach(label => {
                label.style.opacity = '0.6';
                label.style.cursor = 'not-allowed';
            });
            
            const checkBtn = document.getElementById('check-btn');
            if (currentIndex === totalQuestions - 1) {
                checkBtn.textContent = 'Finalizar';
                checkBtn.onclick = finishExam;
            } else {
                checkBtn.style.display = 'none';
            }
        }
        
        function nextQuestion() {
            if (currentIndex < totalQuestions - 1) {
                currentIndex++;
                renderQuestion();
            }
        }
        
        function previousQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }
        
        function updateProgress() {
            const answeredCount = Object.keys(userAnswers).filter(id => userAnswers[id] && userAnswers[id].length > 0).length;
            const percentage = (answeredCount / totalQuestions) * 100;
            
            document.getElementById('progress-fill').style.width = `${percentage}%`;
            document.getElementById('score-display').textContent = `${Math.round(percentage)}%`;
        }
        
        function finishExam() {
            if (confirm("¿Finalizar el examen? Se guardarán tus resultados.")) {
                clearInterval(timerInterval);
                timerInterval = null; // Limpiamos el intervalo para que no salte la alerta
                
                QUESTIONS_DB.forEach(q => {
                    if (!questionResults[q.id]) {
                        const userAnswer = userAnswers[q.id] || [];
                        let isCorrect = false;
                        if (q.type === "single") {
                            isCorrect = userAnswer[0] === q.correct;
                        } else {
                            isCorrect = JSON.stringify(userAnswer.sort()) === JSON.stringify(q.correct.sort());
                        }
                        questionResults[q.id] = {
                            isCorrect: isCorrect,
                            userAnswer: userAnswer,
                            correctAnswer: q.correct
                        };
                    }
                });
                
                localStorage.setItem('finalResults', JSON.stringify(questionResults));
                localStorage.setItem('totalQuestions', totalQuestions);
                window.location.href = 'results.html';
            }
        }
        
        function goHome() {
            if (confirm("¿Volver al inicio? Se perderá el progreso actual.")) {
                clearInterval(timerInterval);
                timerInterval = null; 
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        init();
    </script>
</body>
</html>
