<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Examen • Simulador NetSuite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .exam-questions {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 1rem;
        }
        
        .submit-section {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 1rem;
            border-top: 2px solid #e2e8f0;
            margin-top: 2rem;
        }
        
        .warning-message {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .header-compact .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-compact .timer-container {
            text-align: right;
        }
    </style>
</head>
<body>
    <!-- Header Compacto -->
    <div class="header-compact">
        <div class="container">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;">
                <div class="logo-container">
                    <img src="netsuite_logo.jpg" alt="NetSuite" class="netsuite-logo" style="height: 32px;">
                    <div>
                        <h1 class="title">Examen Completo</h1>
                        <p class="subtitle-text" style="color:#0077C5; font-weight:500; font-size:0.7rem;">50 preguntas • 60 min</p>
                    </div>
                </div>
                <div class="timer-container">
                    <div id="timer" style="font-size: 1rem; font-weight: 600; color: #0077C5;">60:00</div>
                    <div id="answered-counter" style="font-size: 0.7rem;">0 respondidas</div>
                </div>
            </div>
        </div>
        <div class="footer" style="margin-top: 1.5rem;">
                <button onclick="submitExam()" class="btn-submit" style="padding: 8px 20px;">Finalizar</button>
                <button onclick="goHome()" class="btn-reset" style="padding: 8px 20px;">Inicio</button>
        </div>
    </div>

    <div class="container">
        <div class="exam-card" style="padding: 1.5rem;">
            <div class="progress" style="margin-bottom: 1rem;">
                <span style="font-size: 0.9rem;">Progreso</span>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <span id="progress-percent" style="font-size: 0.9rem;">0%</span>
            </div>
            
            <div class="exam-questions" id="questions-container"></div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        let userAnswers = {};
        let timerInterval = null;
        let timeLeft = 3600;
        let totalQuestions = 0;
        
        function init() {
            totalQuestions = QUESTIONS_DB.length;
            
            const savedAnswers = localStorage.getItem('finalAnswers');
            if (savedAnswers) {
                userAnswers = JSON.parse(savedAnswers);
            }
            
            startTimer();
            renderAllQuestions();
            updateProgress();
        }
        
        function startTimer() {
            const savedTime = localStorage.getItem('timeLeft');
            if (savedTime) {
                timeLeft = parseInt(savedTime);
            }
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitExam();
                } else {
                    timeLeft--;
                    localStorage.setItem('timeLeft', timeLeft);
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    document.getElementById("timer").textContent = 
                        `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
                }
            }, 1000);
        }
        
        function renderAllQuestions() {
            const container = document.getElementById('questions-container');
            let html = '';
            
            QUESTIONS_DB.forEach((q, index) => {
                html += `
                    <div class="question" style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0;">
                        <div class="question-header">
                            <div class="question-number" style="width: 32px; height: 32px; font-size: 0.9rem;">${q.id}</div>
                            <div class="question-text" style="font-size: 0.95rem;">${escapeHtml(q.text)}</div>
                            ${q.type === "multi" ? `<div class="multi-label" style="font-size: 0.7rem;">Elige ${q.correct.length}</div>` : ""}
                        </div>
                        <div class="options">
                `;
                
                q.options.forEach(opt => {
                    const isChecked = userAnswers[q.id] && userAnswers[q.id].includes(opt.value);
                    const inputType = q.type === "multi" ? "checkbox" : "radio";
                    const name = q.type === "single" ? `name="q${q.id}"` : "";
                    
                    html += `
                        <label class="option" style="padding: 8px 12px;">
                            <input type="${inputType}" ${name} value="${opt.value}" ${isChecked ? 'checked' : ''} 
                                    onchange="saveAnswer(${q.id}, '${opt.value}', '${q.type}', this)">
                            <span class="option-label" style="font-size: 0.85rem;">${escapeHtml(opt.label)}</span>
                        </label>
                    `;
                });
                
                html += `</div></div>`;
            });
            
            container.innerHTML = html;
        }
        
        function saveAnswer(qId, value, type, inputElement) {
            const question = QUESTIONS_DB.find(q => q.id === qId);
            if (!question) return;
            
            if (type === "single") {
                userAnswers[qId] = [value];
            } else {
                if (!userAnswers[qId]) userAnswers[qId] = [];
                
                if (inputElement.checked) {
                    if (userAnswers[qId].length >= question.correct.length) {
                        inputElement.checked = false;
                        alert(`Solo puedes seleccionar ${question.correct.length} opción(es) para esta pregunta.`);
                        return;
                    }
                    userAnswers[qId].push(value);
                } else {
                    userAnswers[qId] = userAnswers[qId].filter(v => v !== value);
                }
            }
            
            localStorage.setItem('finalAnswers', JSON.stringify(userAnswers));
            updateProgress();
        }
        
        function updateProgress() {
            const answeredCount = Object.keys(userAnswers).filter(id => userAnswers[id] && userAnswers[id].length > 0).length;
            const percentage = (answeredCount / totalQuestions) * 100;
            
            document.getElementById('progress-fill').style.width = `${percentage}%`;
            document.getElementById('progress-percent').textContent = `${Math.round(percentage)}%`;
            document.getElementById('answered-counter').textContent = `${answeredCount}/${totalQuestions}`;
            
            const warningMsg = document.getElementById('warning-message');
            if (answeredCount < totalQuestions) {
                warningMsg.style.display = 'block';
            } else {
                warningMsg.style.display = 'none';
            }
        }
        
        function submitExam() {
            if (confirm("¿Finalizar el examen? Se calcularán tus resultados.")) {
                clearInterval(timerInterval);
                
                let correctCount = 0;
                const questionResults = {};
                
                QUESTIONS_DB.forEach(q => {
                    const userAnswer = userAnswers[q.id] || [];
                    let isCorrect = false;
                    
                    if (q.type === "single") {
                        isCorrect = userAnswer[0] === q.correct;
                    } else {
                        isCorrect = JSON.stringify(userAnswer.sort()) === JSON.stringify(q.correct.sort());
                    }
                    
                    if (isCorrect) correctCount++;
                    
                    questionResults[q.id] = {
                        isCorrect: isCorrect,
                        userAnswer: userAnswer,
                        correctAnswer: q.correct
                    };
                });
                
                localStorage.setItem('finalResults', JSON.stringify(questionResults));
                localStorage.setItem('totalQuestions', totalQuestions);
                localStorage.setItem('correctCount', correctCount);
                
                window.location.href = 'results.html';
            }
        }
        
        function goHome() {
            if (confirm("¿Volver al inicio? Se perderá el progreso actual.")) {
                clearInterval(timerInterval);
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        init();
    </script>
</body>
</html>
